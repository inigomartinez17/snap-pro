<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descarga videos de redes sociales en máxima calidad al instante.">
    <title>SnapPro | Ultimate Downloader</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide { display: none !important; }
        @keyframes pulse-emerald { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .btn-glow { animation: pulse-emerald 2s infinite; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-xl w-full text-center relative z-10">
        
        <div class="mb-10">
            <h1 class="text-5xl md:text-6xl font-black mb-2 tracking-tighter italic">
                SNAP<span class="text-blue-500">PRO</span>
            </h1>
            <p class="text-slate-400 font-medium">Bypass Activo: YT, IG, TT, FB</p>
        </div>

        <div class="glass p-8 rounded-[2rem] shadow-2xl relative min-h-[300px] flex flex-col justify-center">
            
            <div id="step-input" class="space-y-4">
                <input type="url" id="videoUrl" placeholder="Pega el enlace de la red social..." 
                    class="w-full bg-black/40 border border-slate-700/50 p-5 rounded-2xl outline-none focus:border-blue-500 transition-all text-center text-lg placeholder:text-slate-600">
                <button onclick="startProcess()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-xl shadow-blue-900/20">
                    EXTRAER VÍDEO
                </button>
            </div>

            <div id="step-loading" class="hide py-6 flex flex-col items-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 mb-4"></div>
                <p class="text-xl font-bold text-white mb-2">Canalizando a través del Proxy...</p>
                <p class="text-sm text-slate-400">Evitando bloqueos de servidor origen (Error 403)</p>
            </div>

            <div id="step-result" class="hide space-y-5">
                <div class="bg-emerald-500/20 text-emerald-400 p-2 rounded-xl inline-block px-4 font-bold text-sm uppercase tracking-widest border border-emerald-500/30">
                    Bypass Exitoso
                </div>
                <h2 id="videoTitle" class="text-lg font-bold text-white truncate px-4">Video Listo</h2>
                
                <a id="downloadBtn" href="#" class="block w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-xl btn-glow transition-all text-white shadow-lg shadow-emerald-900/40">
                   <i class="fas fa-download mr-2"></i> DESCARGAR AHORA
                </a>
                
                <button onclick="location.reload()" class="text-slate-400 text-sm hover:text-white transition-colors mt-4">
                    <i class="fas fa-rotate-right mr-1"></i> Limpiar y procesar otro
                </button>
            </div>

        </div>
    </div>

    <script>
        async function startProcess() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            if(!urlInput) return alert("Pega un enlace válido.");

            document.getElementById('step-input').classList.add('hide');
            document.getElementById('step-loading').classList.remove('hide');

            try {
                // 1. Llama al buscador (download.js)
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await res.json();

                // Damos 2 segundos visuales de "hackeo"
                setTimeout(() => {
                    document.getElementById('step-loading').classList.add('hide');
                    
                    if(data.success && data.downloadUrl) {
                        document.getElementById('step-result').classList.remove('hide');
                        document.getElementById('videoTitle').innerText = data.title;
                        
                        // 2. Conecta el botón verde al proxy (proxy.js) con la URL cruda encriptada
                        const encodedUrl = encodeURIComponent(data.downloadUrl);
                        document.getElementById('downloadBtn').href = `/api/proxy?url=${encodedUrl}`;
                    } else {
                        alert("❌ Error: " + (data.error || "No se pudo extraer el enlace."));
                        location.reload();
                    }
                }, 2000);

            } catch (err) {
                alert("❌ Fallo crítico de conexión de red.");
                location.reload();
            }
        }
    </script>
</body>
</html>
