<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapPro Quantum | Advanced Media Protocol</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --quantum: #ccff00; --bg: #000000; --surface: #0a0a0a; --surface-border: #1a1a1a; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow-x: hidden; cursor: none; /* Cursor nativo oculto */
        }
        .mono { font-family: 'Space Mono', monospace; }

        /* Cuadrícula de Fondo Cuántica */
        .quantum-grid {
            position: fixed; inset: 0; z-index: -2;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
        }

        /* Cursor Personalizado */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 20px; height: 20px;
            border: 2px solid var(--quantum); border-radius: 50%;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            mix-blend-mode: difference;
        }
        #cursor-trail {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--quantum); border-radius: 50%; pointer-events: none;
            z-index: 9998; transform: translate(-50%, -50%);
            transition: top 0.1s ease-out, left 0.1s ease-out;
        }

        /* Bento 3D Card */
        .q-card {
            background: var(--surface); border: 1px solid var(--surface-border);
            border-radius: 24px; padding: 2rem; position: relative;
            transform-style: preserve-3d; transition: border-color 0.3s;
        }
        .q-card:hover { border-color: rgba(204, 255, 0, 0.3); }

        .btn-quantum {
            background: var(--quantum); color: #000; font-weight: 900;
            padding: 1rem 2.5rem; border-radius: 12px; text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-quantum:hover { box-shadow: 0 0 30px rgba(204, 255, 0, 0.4); transform: translateY(-2px); }

        .hide { display: none !important; }

        /* CRT Text Effect */
        .crt-text { text-shadow: 0 0 5px rgba(204, 255, 0, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>
    <div class="quantum-grid"></div>

    <nav class="w-full max-w-6xl flex justify-between items-center mb-10 z-10">
        <div class="flex items-center gap-3">
            <div class="w-4 h-4 bg-[#ccff00] animate-pulse"></div>
            <h1 class="text-xl font-black tracking-tighter">SNAP<span class="text-[#ccff00]">PRO</span>_13</h1>
        </div>
        <div class="mono text-xs text-zinc-500 flex gap-6">
            <span class="hidden md:inline">PROTOCOL: SECURE</span>
            <span id="sys-time">00:00:00</span>
        </div>
    </nav>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6 z-10">
        
        <div class="md:col-span-2 q-card tilt-element flex flex-col justify-center min-h-[300px]">
            <h2 class="text-4xl md:text-5xl font-black mb-6 leading-tight">
                BYPASS <br><span class="text-[#ccff00]">RESTRICTIONS.</span>
            </h2>
            <div class="relative flex items-center group">
                <div class="absolute left-6 text-zinc-500"><i class="fas fa-link"></i></div>
                <input type="url" id="videoUrl" placeholder="Inyectar URL del objetivo..." 
                    class="w-full bg-zinc-950 border border-zinc-800 py-6 pl-14 pr-40 rounded-xl outline-none text-lg font-light text-[#ccff00] placeholder:text-zinc-700 transition-colors focus:border-[#ccff00]/50 mono hover-target">
                <button onclick="executeQuantum()" class="absolute right-2 btn-quantum hover-target text-sm">
                    EXECUTE
                </button>
            </div>
        </div>

        <div class="md:col-span-1 q-card tilt-element flex flex-col relative overflow-hidden min-h-[300px]">
            <div class="flex justify-between items-center mb-4 z-10">
                <span class="mono text-[10px] text-zinc-500 tracking-widest uppercase">Bandwidth Monitor</span>
                <span class="w-2 h-2 rounded-full bg-[#ccff00] shadow-[0_0_10px_#ccff00]"></span>
            </div>
            <div class="flex-1 w-full relative z-10">
                <canvas id="wave-canvas" class="w-full h-full absolute inset-0"></canvas>
            </div>
            <div class="mt-4 z-10">
                <p class="text-3xl font-black text-[#ccff00] mono">4.2 <span class="text-sm text-zinc-500">GB/s</span></p>
            </div>
        </div>

        <div id="ui-terminal" class="hide md:col-span-3 q-card tilt-element border-[#ccff00]/30 shadow-[0_0_50px_rgba(204,255,0,0.05)]">
            <div class="flex items-center gap-3 border-b border-zinc-800 pb-4 mb-4">
                <i class="fas fa-terminal text-[#ccff00]"></i>
                <span class="mono text-xs text-white">ROOT@SNAP-PRO:~# PROCESSING_PAYLOAD</span>
            </div>
            <div id="terminal-logs" class="mono text-xs text-zinc-400 space-y-2 h-32 overflow-hidden flex flex-col justify-end"></div>
            <div class="mt-6 h-1 w-full bg-zinc-900 overflow-hidden">
                <div id="q-progress" class="h-full bg-[#ccff00] w-0 transition-all duration-75"></div>
            </div>
        </div>

        <div id="ui-result" class="hide md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="q-card tilt-element p-2 overflow-hidden">
                <div class="relative w-full h-full min-h-[200px] rounded-xl overflow-hidden border border-zinc-800">
                    <img id="prev-img" class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                </div>
            </div>
            <div class="md:col-span-2 q-card tilt-element flex flex-col justify-between">
                <div>
                    <div class="inline-block bg-[#ccff00] text-black px-2 py-1 text-[10px] font-black mono mb-4 uppercase">Payload_Decrypted</div>
                    <h3 id="prev-title" class="text-2xl md:text-3xl font-bold line-clamp-2 mb-2">Archivo Listo</h3>
                    <p class="mono text-xs text-zinc-500">SHA-256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855</p>
                </div>
                <div class="mt-8 flex gap-4">
                    <button id="dl-btn" class="btn-quantum w-full flex items-center justify-center gap-3 hover-target">
                        <i class="fas fa-download"></i> EXPORT TO LOCAL
                    </button>
                    <button onclick="location.reload()" class="bg-zinc-900 border border-zinc-800 hover:border-zinc-700 px-6 rounded-12 transition-colors hover-target">
                        <i class="fas fa-redo text-zinc-400"></i>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. RELOJ DEL SISTEMA ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('sys-time').innerText = now.toLocaleTimeString('es-ES', {hour12: false}) + ' UTC';
        }, 1000);

        // --- 2. CURSOR MAGNÉTICO ---
        const cursor = document.getElementById('custom-cursor');
        const trail = document.getElementById('cursor-trail');
        const hovers = document.querySelectorAll('.hover-target');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => { trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px'; }, 50);
        });

        hovers.forEach(target => {
            target.addEventListener('mouseenter', () => {
                cursor.style.width = '50px'; cursor.style.height = '50px';
                cursor.style.background = 'rgba(204, 255, 0, 0.2)';
            });
            target.addEventListener('mouseleave', () => {
                cursor.style.width = '20px'; cursor.style.height = '20px';
                cursor.style.background = 'transparent';
            });
        });

        // --- 3. MOTOR FÍSICO 3D (Vanilla Tilt) ---
        const cards = document.querySelectorAll('.tilt-element');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const centerX = rect.width / 2; const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -5;
                const rotateY = ((x - centerX) / centerX) * 5;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) translateZ(0)`;
            });
        });

        // --- 4. OSCILOSCOPIO (Canvas) ---
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = canvas.offsetWidth;
        let height = canvas.height = canvas.offsetHeight;
        let time = 0;

        function drawOscilloscope() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = '#ccff00';
            ctx.lineWidth = 2;
            for(let i = 0; i < width; i++) {
                const noise = Math.random() * 10 - 5;
                const y = height/2 + Math.sin(i * 0.05 + time) * 30 + Math.cos(i * 0.02) * 15 + noise;
                if(i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();
            time += 0.1;
            requestAnimationFrame(drawOscilloscope);
        }
        drawOscilloscope();

        // --- 5. SECUENCIA QUANTUM (Logic) ---
        async function executeQuantum() {
            const url = document.getElementById('videoUrl').value.trim();
            if(!url) return;

            document.getElementById('videoUrl').parentElement.parentElement.classList.add('hide');
            const term = document.getElementById('ui-terminal');
            term.classList.remove('hide');

            const logs = document.getElementById('terminal-logs');
            const steps = [
                "[AUTH] Generando token de un solo uso...",
                "[NET] Estableciendo túnel P2P encriptado...",
                "[EXTRACT] Inyectando script de extracción profundo...",
                "[FILE] Compilando fragmentos binarios...",
                "[SUCCESS] Archivo ensamblado. Limpiando huellas..."
            ];

            let p = 0;
            const logInterval = setInterval(() => {
                p += 1.5;
                document.getElementById('q-progress').style.width = p + '%';
                
                if (p % 20 === 0 && p/20 - 1 < steps.length) {
                    const line = document.createElement('p');
                    line.className = 'crt-text';
                    line.innerText = `> ${steps[Math.floor(p/20) - 1]}`;
                    logs.appendChild(line);
                }

                if(p >= 100) clearInterval(logInterval);
            }, 30);

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if(data.success) {
                    setTimeout(() => {
                        term.classList.add('hide');
                        document.getElementById('ui-result').classList.remove('hide');
                        document.getElementById('prev-img').src = data.thumbnail;
                        document.getElementById('prev-title').innerText = data.title;
                        
                        document.getElementById('dl-btn').onclick = () => {
                            window.open(data.links[0].url, '_blank');
                            alert("⬇️ Usa Clic Derecho o Mantén Pulsado para guardar el archivo final.");
                        };
                    }, 2500);
                }
            } catch (e) {
                setTimeout(() => location.reload(), 2000);
            }
        }
    </script>
</body>
</html>
