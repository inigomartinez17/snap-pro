<script>
        async function startDownload() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            
            if(!urlInput) {
                alert("⚠️ Por favor, introduce un enlace válido primero.");
                return;
            }

            // 1. Ocultar input y mostrar pantalla de carga
            document.getElementById('step-input').classList.add('hide-element');
            const stepLoading = document.getElementById('step-loading');
            stepLoading.classList.remove('hide-element');
            stepLoading.classList.add('flex');

            const waitTime = new Promise(resolve => setTimeout(resolve, 3500));
            
            // Llamada al backend
            const apiCall = fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            })
            .then(res => res.json())
            .catch(err => {
                return { success: false, error: "Fallo crítico de conexión web: " + err };
            });

            const [_, data] = await Promise.all([waitTime, apiCall]);

            // 4. Ocultar pantalla de carga
            stepLoading.classList.remove('flex');
            stepLoading.classList.add('hide-element');
            
            // 5. Evaluar y buscar el enlace inteligentemente
            if(data && data.success && data.rawData) {
                
                // Algoritmo para encontrar el maldito enlace sea cual sea el formato
                const raw = data.rawData;
                let finalUrl = null;
                
                // Intentar formatos conocidos
                if (raw.links && Array.isArray(raw.links) && raw.links.length > 0) {
                    finalUrl = raw.links[0].link || raw.links[0].url;
                } else if (raw.medias && Array.isArray(raw.medias) && raw.medias.length > 0) {
                    // Buscar el de mejor calidad sin marca de agua
                    const noWatermark = raw.medias.find(m => m.type === 'video' && m.quality !== 'watermark');
                    if (noWatermark) {
                        finalUrl = noWatermark.url || noWatermark.link;
                    } else {
                        finalUrl = raw.medias[0].url || raw.medias[0].link;
                    }
                } else if (raw.url) { finalUrl = raw.url; }
                else if (raw.video) { finalUrl = raw.video; }
                else if (raw.hd) { finalUrl = raw.hd; }
                else if (raw.data && raw.data.play) { finalUrl = raw.data.play; } // Formato TikTok alternativo
                else if (raw.data && raw.data.hdplay) { finalUrl = raw.data.hdplay; }

                if (finalUrl) {
                    const stepResult = document.getElementById('step-result');
                    stepResult.classList.remove('hide-element');
                    stepResult.classList.add('flex');
                    document.getElementById('videoTitle').innerText = raw.title || "Video HD Procesado";
                    document.getElementById('downloadBtn').href = finalUrl;
                } else {
                    alert("❌ La API conectó bien pero no encontramos el MP4 en la respuesta. Respuesta cruda: " + JSON.stringify(raw).substring(0, 100));
                    reiniciar();
                }

            } else {
                // AQUÍ ESTÁ LA CLAVE: Si falla, nos dirá el motivo exacto
                const mensajeError = data.error || (data.rawData && data.rawData.message) || "Desconocido";
                alert("❌ ERROR DEL SERVIDOR: " + mensajeError + "\nSi ves esto, envíamelo para arreglarlo al momento.");
                reiniciar();
            }
        }

        function reiniciar() {
            document.getElementById('step-input').classList.remove('hide-element');
            document.getElementById('videoUrl').value = '';
        }
    </script>
